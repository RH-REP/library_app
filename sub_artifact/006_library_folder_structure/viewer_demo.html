          content: `# Organized Text Metadata Header Contract

機械処理の唯一の正本にはせず、source_refs、item record、source manifest、extraction record と同期する。`

      ];

      const state = {
        selectedPath: "main_artifact/private_data/programming_tech_library/organized_data/item_20260713_001_requirements_note/index.md",
        expanded: new Set([
          "main_artifact",
          "main_artifact/private_data",
          "main_artifact/private_data/programming_tech_library",
          "main_artifact/private_data/programming_tech_library/raw_sources",
          "main_artifact/private_data/programming_tech_library/raw_sources/src_20260713_001_requirements_note",
          "main_artifact/private_data/programming_tech_library/extracted_text",
          "main_artifact/private_data/programming_tech_library/extracted_text/src_20260713_001_requirements_note",
          "main_artifact/private_data/programming_tech_library/organized_data",
          "main_artifact/private_data/programming_tech_library/organized_data/item_20260713_001_requirements_note",
          "main_artifact/private_data/programming_tech_library/library_records",
          "sub_artifact",
          "sub_artifact/006_library_folder_structure"
        ])
      };

      const el = {
        tree: document.getElementById("tree"),
        search: document.getElementById("searchInput"),
        kind: document.getElementById("kindFilter"),
        tag: document.getElementById("tagFilter"),
        status: document.getElementById("statusFilter"),
        matchCount: document.getElementById("matchCount"),
        activeTab: document.getElementById("activeTab"),
        title: document.getElementById("documentTitle"),
        path: document.getElementById("documentPath"),
        badgeRow: document.getElementById("badgeRow"),
        preview: document.getElementById("previewPane"),
        rawLabel: document.getElementById("rawLabel"),
        rawText: document.getElementById("rawText"),
        updatedAt: document.getElementById("updatedAt"),
        expandAll: document.getElementById("expandAllButton"),
        collapseAll: document.getElementById("collapseAllButton")
      };

      const icons = {
        folder: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`,
        file: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>`,
        chevronRight: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>`,
        chevronDown: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>`
      };

      function unique(values) {
        return [...new Set(values)].sort((a, b) => a.localeCompare(b, "ja"));
      }

      function basename(path) {
        return path.split("/").pop();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function inlineMarkdown(value) {
        return escapeHtml(value)
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function stripMetadataBlock(markdown) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        if (lines[0] !== '""""""') return { metadata: [], body: markdown };
        const endIndex = lines.findIndex((line, index) => index > 0 && line === '""""""');
        if (endIndex < 0) return { metadata: [], body: markdown };
        const metadata = lines.slice(1, endIndex).map((line) => {
          const separator = line.indexOf("：");
          if (separator < 0) return ["", line];
          return [line.slice(0, separator), line.slice(separator + 1)];
        });
        return { metadata, body: lines.slice(endIndex + 1).join("\n") };
      }

      function renderMarkdown(markdown) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        const html = [];
        let index = 0;

        while (index < lines.length) {
          const line = lines[index];

          if (!line.trim()) {
            index += 1;
            continue;
          }

          if (line.startsWith("```")) {
            const code = [];
            index += 1;
            while (index < lines.length && !lines[index].startsWith("```")) {
              code.push(lines[index]);
              index += 1;
            }
            index += 1;
            html.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
            continue;
          }

          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
            index += 1;
            continue;
          }

          if (/^-\s+/.test(line)) {
            const items = [];
            while (index < lines.length && /^-\s+/.test(lines[index])) {
              items.push(`<li>${inlineMarkdown(lines[index].replace(/^-\s+/, ""))}</li>`);
              index += 1;
            }
            html.push(`<ul>${items.join("")}</ul>`);
            continue;
          }

          if (/^\d+\.\s+/.test(line)) {
            const items = [];
            while (index < lines.length && /^\d+\.\s+/.test(lines[index])) {
              items.push(`<li>${inlineMarkdown(lines[index].replace(/^\d+\.\s+/, ""))}</li>`);
              index += 1;
            }
            html.push(`<ol>${items.join("")}</ol>`);
            continue;
          }

          const paragraph = [];
          while (
            index < lines.length &&
            lines[index].trim() &&
            !lines[index].startsWith("```") &&
            !/^(#{1,3})\s+/.test(lines[index]) &&
            !/^-\s+/.test(lines[index]) &&
            !/^\d+\.\s+/.test(lines[index])
          ) {
            paragraph.push(lines[index]);
            index += 1;
          }
          html.push(`<p>${inlineMarkdown(paragraph.join(" "))}</p>`);
        }

        return html.join("\n");
      }

      function fillSelect(select, label, values) {
        select.innerHTML = "";
        const all = document.createElement("option");
        all.value = "all";
        all.textContent = `${label}: all`;
        select.appendChild(all);
        values.forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = `${label}: ${value}`;
          select.appendChild(option);
        });
      }

      function setupFilters() {
        fillSelect(el.kind, "kind", unique(fileData.map((item) => item.kind)));
        fillSelect(el.tag, "tag", unique(fileData.flatMap((item) => item.tags)));
        fillSelect(el.status, "status", unique(fileData.map((item) => item.status)));
      }

      function matchesFilters(item) {
        const query = el.search.value.trim().toLowerCase();
        if (el.kind.value !== "all" && item.kind !== el.kind.value) return false;
        if (el.tag.value !== "all" && !item.tags.includes(el.tag.value)) return false;
        if (el.status.value !== "all" && item.status !== el.status.value) return false;
        if (!query) return true;
        return [item.path, item.kind, item.status, item.tags.join(" "), item.content].join(" ").toLowerCase().includes(query);
      }

      function filteredFiles() {
        return fileData.filter(matchesFilters);
      }

      function folderAncestors(path) {
        const parts = path.split("/");
        const folders = [];
        for (let i = 1; i < parts.length; i += 1) {
          folders.push(parts.slice(0, i).join("/"));
        }
        return folders;
      }

      function buildTree(files) {
        const root = { name: "", path: "", type: "folder", children: new Map() };
        files.forEach((file) => {
          const parts = file.path.split("/");
          let cursor = root;
          parts.forEach((part, index) => {
            const currentPath = parts.slice(0, index + 1).join("/");
            if (!cursor.children.has(part)) {
              cursor.children.set(part, {
                name: part,
                path: currentPath,
                type: index === parts.length - 1 ? "file" : "folder",
                children: new Map(),
                file: index === parts.length - 1 ? file : null
              });
            }
            cursor = cursor.children.get(part);
          });
        });
        return root;
      }

      function flattenTree(node, depth = 0, rows = []) {
        [...node.children.values()]
          .sort((a, b) => {
            if (a.type !== b.type) return a.type === "folder" ? -1 : 1;
            return a.name.localeCompare(b.name, "ja");
          })
          .forEach((child) => {
            rows.push({ node: child, depth });
            if (child.type === "folder" && state.expanded.has(child.path)) {
              flattenTree(child, depth + 1, rows);
            }
          });
        return rows;
      }

      function renderTree() {
        const files = filteredFiles();
        const visiblePaths = new Set(files.map((file) => file.path));
        files.forEach((file) => folderAncestors(file.path).forEach((folder) => visiblePaths.add(folder)));
        el.matchCount.textContent = `${files.length} files`;
        el.tree.innerHTML = "";

        flattenTree(buildTree(files)).forEach(({ node, depth }) => {
          const row = document.createElement("button");
          row.type = "button";
          row.className = `tree-item${node.path === state.selectedPath ? " is-selected" : ""}`;
          row.style.setProperty("--depth", depth);
          row.hidden = !visiblePaths.has(node.path);

          const expander = document.createElement("span");
          expander.className = "tree-expander";
          if (node.type === "folder" && node.children.size) {
            expander.innerHTML = state.expanded.has(node.path) ? icons.chevronDown : icons.chevronRight;
          }

          const icon = document.createElement("span");
          icon.className = `tree-icon${node.type === "file" ? " file" : ""}`;
          icon.innerHTML = node.type === "folder" ? icons.folder : icons.file;

          const name = document.createElement("span");
          name.className = "tree-name";
          name.textContent = node.name;

          const pill = document.createElement("span");
          pill.className = "kind-pill";
          pill.textContent = node.file ? node.file.kind : "dir";

          row.append(expander, icon, name, pill);
          row.addEventListener("click", () => {
            if (node.type === "folder") {
              if (state.expanded.has(node.path)) state.expanded.delete(node.path);
              else state.expanded.add(node.path);
              renderTree();
              return;
            }
            state.selectedPath = node.path;
            renderTree();
            renderDocument();
          });
          el.tree.appendChild(row);
        });
      }

      function currentFile() {
        const files = filteredFiles();
        if (!files.some((file) => file.path === state.selectedPath)) {
          state.selectedPath = files[0]?.path || fileData[0].path;
        }
        return fileData.find((item) => item.path === state.selectedPath) || fileData[0];
      }

      function renderMetadata(metadata) {
        if (!metadata.length) return "";
        const fields = metadata.map(([key, value]) => `
          <div class="metadata-field">
            <div class="metadata-key">${escapeHtml(key || "metadata")}</div>
            <div class="metadata-value">${escapeHtml(value || "未確認")}</div>
          </div>
        `).join("");
        return `
          <section class="metadata-panel" aria-label="metadata">
            <div class="metadata-title">
              <span>Metadata Header</span>
              <span>""""""</span>
            </div>
            <div class="metadata-grid">${fields}</div>
          </section>
        `;
      }

      function renderPipeline(file) {
        const steps = file.sourceChain.map(([label, path]) => `
          <div class="pipeline-step${file.stage === label || file.stage === path.split("/")[0] ? " is-current" : ""}">
            <div class="pipeline-label">${escapeHtml(label)}</div>
            <div class="pipeline-path">${escapeHtml(path)}</div>
          </div>
        `).join("");
        return `<section class="pipeline" aria-label="source pipeline">${steps}</section>`;
      }

      function renderDocument() {
        const file = currentFile();
        const parsed = stripMetadataBlock(file.content);
        el.activeTab.textContent = basename(file.path);
        el.title.textContent = basename(file.path);
        el.path.textContent = file.path;
        el.badgeRow.innerHTML = [
          `<span class="badge accent">${escapeHtml(file.status)}</span>`,
          `<span class="badge">${escapeHtml(file.kind)}</span>`,
          ...file.tags.map((tag) => `<span class="badge">${escapeHtml(tag)}</span>`)
        ].join("");
        el.preview.innerHTML = `
          ${renderPipeline(file)}
          ${renderMetadata(parsed.metadata)}
          <div class="markdown">${renderMarkdown(parsed.body)}</div>
        `;
        el.rawLabel.textContent = file.kind === "item" ? "Raw Markdown" : "Raw Content";
        el.updatedAt.textContent = file.updated;
        el.rawText.value = file.content;
      }

      function expandAll() {
        fileData.forEach((file) => folderAncestors(file.path).forEach((folder) => state.expanded.add(folder)));
        renderTree();
      }

      function collapseAll() {
        state.expanded.clear();
        renderTree();
      }

      setupFilters();
      renderTree();
      renderDocument();

      [el.search, el.kind, el.tag, el.status].forEach((control) => {
        control.addEventListener("input", () => {
          renderTree();
          renderDocument();
        });
      });
      el.expandAll.addEventListener("click", expandAll);
      el.collapseAll.addEventListener("click", collapseAll);
    </script>
