<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=./main_artifact/web_app/index.html">
    <title>Library Knowledge Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(100% - 32px, 520px);
        padding: 32px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.25;
      }

      p {
        margin: 0 0 20px;
        color: #526173;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 6px;
        color: #ffffff;
        background: #2563eb;
        text-decoration: none;
        font-weight: 650;
      }

      a:focus-visible {
        outline: 3px solid #93c5fd;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Library Knowledge Demo</h1>
      <p>Opening the current demo viewer.</p>
      <a href="./main_artifact/web_app/index.html">Open demo viewer</a>
    </main>
  </body>
</html>
